name: Ubuntu Web Desktop

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Instalar escritorio
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-terminal firefox dbus-x11 xvfb x11vnc novnc websockify

      - name: Iniciar escritorio virtual
        run: |
          export DISPLAY=:1
          Xvfb :1 -screen 0 1366x768x24 &
          sleep 5
          startxfce4 &
          sleep 10

      - name: Iniciar VNC
        run: |
          x11vnc -display :1 -nopw -forever -shared -bg

      - name: Iniciar noVNC
        run: |
          websockify --web=/usr/share/novnc/ 6080 localhost:5900 &
          sleep 5

      - name: Instalar Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Conectar Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          echo "URL:"
          echo "http://$(tailscale ip -4):6080/vnc.html"

      - name: Mantener activo
        run: |
          while true; do
            sleep 300
          done
